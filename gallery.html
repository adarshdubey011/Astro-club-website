<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Astro Club BIT Durg</title>
  <link rel="icon" href="assets/images/logo.png" type="image/png">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/gallery.css">
  <link rel="stylesheet" href="css/gravity.css">
</head>
<body>
<canvas id="cosmos-canvas"></canvas>

<nav id="navbar">
  <a href="index.html" class="nav-logo">
    <img src="assets/images/logo.png" alt="Logo">
    <div class="nav-logo-text">Astro Club<span>BIT Durg</span></div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="gallery.html" class="active">Gallery</a></li>
    <li><a href="research.html">Research</a></li>
    <li><a href="quiz.html">Quiz</a></li>
    <li><a href="calendar.html">Events</a></li>
    <li><a href="join.html" class="nav-join-btn">Join Club</a></li>
  </ul>
  <div class="nav-hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="page-content">
  <section style="padding: 0 5%;">

    <div class="gallery-controls">
      <div style="flex:1;">
        <div class="section-label">Visual Archive</div>
        <h1 class="section-title reveal" style="margin-bottom:8px;">Event <span class="pink-glow">Gallery</span></h1>
        <p class="section-desc reveal">Every image tells a story of curiosity and wonder.</p>
      </div>
    </div>

    
    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:40px;" class="reveal">
      <button class="gallery-filter active" data-filter="all">All Events</button>
      <button class="gallery-filter" data-filter="fest">Annual Fest</button>
      <button class="gallery-filter" data-filter="observation">Observation</button>
      <button class="gallery-filter" data-filter="workshop">Workshop</button>
      <button class="gallery-filter" data-filter="outreach">Outreach</button>
    </div>

    <div class="gallery-events-grid" id="gallery-events-grid">
    
      <div style="grid-column:1/-1;text-align:center;padding:80px 0;color:var(--star-dim);">
        <div style="font-size:2.5rem;margin-bottom:16px;animation:float 3s ease-in-out infinite">🔭</div>
        <p style="font-size:0.9rem;letter-spacing:0.1em;">Loading gallery from the cosmos...</p>
      </div>
    </div>

  </section>
</div>

<footer style="margin-top:80px;">
  <div class="footer-bottom" style="border-top:1px solid rgba(74,158,255,0.1);padding-top:28px;">
    <p>© 2026 Astro Club BIT Durg</p>
    <div class="footer-stars">✦ &nbsp;AD ASTRA PER ASPERA&nbsp; ✦</div>
  </div>
</footer>

<script src="js/main.js"></script>
<script type="module" src="js/gallery.js"></script>
<script>
  
  document.querySelectorAll('.gallery-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.gallery-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Filter cards by data-category attribute
      const filter = btn.dataset.filter;
      document.querySelectorAll('.event-collection').forEach(card => {
        const cat = card.querySelector('.event-collection-tag')?.textContent.toLowerCase() || '';
        card.style.display = (filter === 'all' || cat.includes(filter)) ? 'block' : 'none';
      });
    });
  });
</script>
  <script src="js/gravity.js"></script>
</body>
</html>
