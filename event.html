<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event — Astro Club BIT Durg</title>
  <link rel="icon" href="assets/images/logo.png" type="image/png">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/event.css">
  <link rel="stylesheet" href="css/gravity.css">
</head>
<body>
<canvas id="cosmos-canvas"></canvas>

<nav id="navbar">
  <a href="index.html" class="nav-logo">
    <img src="assets/images/logo.png" alt="Logo" onerror="this.style.display='none'">
    <div class="nav-logo-text">Astro Club<span>BIT Durg</span></div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="gallery.html" class="active">Gallery</a></li>
    <li><a href="research.html">Research</a></li>
    <li><a href="quiz.html">Quiz</a></li>
    <li><a href="calendar.html">calendar</a></li>
    <li><a href="join.html" class="nav-join-btn">Join Club</a></li>
  </ul>
  <div class="nav-hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="page-content">

  
  <div class="event-page-header">
    <a href="gallery.html" class="event-back">
      <span>←</span> Back to Gallery
    </a>
    <div class="event-header-meta">
      <span id="event-tag" class="event-tag"></span>
      <span id="event-meta" class="event-page-meta"></span>
    </div>
    <h1 id="event-title" class="event-page-title">Loading…</h1>
    <p  id="event-desc"  class="event-page-desc"></p>
  </div>

  
  <div id="event-image-grid" class="event-image-grid">
    <!-- Loading state -->
    <div class="event-loading" id="event-loading">
      <div class="loading-spinner"></div>
      <p>Loading photos…</p>
    </div>
  </div>

</div>


<div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
  <div class="lightbox-backdrop"></div>

  <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>

  <div class="lightbox-inner">
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Previous">‹</button>

    <div class="lightbox-img-wrap">
      <img id="lightbox-img" src="" alt="Event photo">
    </div>

    <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Next">›</button>
  </div>

  <div class="lightbox-footer">
    <span id="lightbox-counter" class="lightbox-counter">1 / 1</span>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/event.js"></script>
  <script src="js/gravity.js"></script>
</body>
</html>
